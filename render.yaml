services:   - type: web     name: paper-trading     runtime: python     plan: free     region: singapore     buildCommand: pip install -r requirements.txt     startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT     healthCheckPath: /api/health     envVars:       - key: PYTHON_VERSION         value: "3.12.8"       - key: HOST         value: "0.0.0.0"